<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HIPJOY — Your Mind, Architected.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --sage:#A8C99B;
  --purple:#9B4FDC;
  --sunset:#F4845F;
  --text:#F0EDE5;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  overflow:hidden;
}
@media(max-width:640px){html,body{overflow:auto}body{min-height:100svh}}

/* ── NAV ───────────────────────────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  height:50px;padding:0 clamp(1.2rem,4vw,3rem);
  background:rgba(10,10,15,.78);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(168,201,155,.07);
}
.nav-brand{
  font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:.22em;color:var(--sage);text-decoration:none;
  text-shadow:0 0 22px rgba(168,201,155,.35);
}
.nav-right{display:flex;align-items:center;gap:1.6rem}
.nav-link{font-size:.56rem;letter-spacing:.14em;text-decoration:none;transition:color .2s}
.nav-link.dim{color:rgba(240,237,229,.32)}
.nav-link.dim:hover{color:rgba(240,237,229,.68)}
.nav-link.sage{color:rgba(168,201,155,.42)}
.nav-link.sage:hover{color:var(--sage)}

/* ── HERO ──────────────────────────────────────────────────────────────────── */
#hero{
  position:relative;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;padding:50px 1.5rem 44px;
}

/* Soft vignette — edges only, center stays bright for orbs */
#hero::after{
  content:'';position:absolute;inset:0;z-index:6;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 90% at 50% 50%, transparent 30%, rgba(10,10,15,.55) 100%),
    linear-gradient(to bottom, rgba(10,10,15,.35) 0%, transparent 12%, transparent 85%, rgba(10,10,15,.45) 100%);
}

/* ── GLASS ORBS ─────────────────────────────────────────────────────────────
   Each orb = container (clips children) + inner shine div
   Container has background gradient + moderate blur
   Inner .orb-shine provides the specular highlight spot
─────────────────────────────────────────────────────────────────────────── */
.orb{
  position:absolute;
  border-radius:50%;
  overflow:hidden;
  pointer-events:none;
  will-change:transform;
}

/* Specular highlight — bright top-left spot on every orb */
.orb-shine{
  position:absolute;
  top:7%;left:9%;
  width:38%;height:38%;
  border-radius:50%;
  background:radial-gradient(circle at 38% 36%,
    rgba(255,255,255,.88) 0%,
    rgba(255,255,255,.40) 28%,
    rgba(255,255,255,.10) 55%,
    transparent 72%
  );
  filter:blur(9px);
  z-index:2;
}

/* Rim transmission glow — bottom-right catch light */
.orb-rim{
  position:absolute;
  bottom:8%;right:8%;
  width:28%;height:28%;
  border-radius:50%;
  z-index:2;
  filter:blur(14px);
}

/* SAGE — top-right, dominant, HUGE */
.orb-sage{
  width:clamp(520px,74vw,1020px);
  height:clamp(520px,74vw,1020px);
  top:-20%;right:-22%;
  background:
    radial-gradient(circle at 38% 32%,
      rgba(205,255,175,.70) 0%,
      rgba(155,218,125,.50) 20%,
      rgba(108,182,90,.30) 44%,
      rgba(65,145,60,.10) 66%,
      transparent 100%);
  filter:blur(18px);
  animation:floatA 10s ease-in-out infinite;
}
.orb-sage .orb-rim{background:radial-gradient(circle,rgba(175,240,140,.50) 0%,transparent 70%)}

/* PURPLE — bottom-left, huge */
.orb-purple{
  width:clamp(480px,68vw,940px);
  height:clamp(480px,68vw,940px);
  bottom:-24%;left:-20%;
  background:
    radial-gradient(circle at 52% 36%,
      rgba(220,148,255,.65) 0%,
      rgba(160,80,228,.46) 24%,
      rgba(105,45,195,.25) 50%,
      rgba(65,20,150,.08) 70%,
      transparent 100%);
  filter:blur(22px);
  animation:floatB 13s ease-in-out infinite;
}
.orb-purple .orb-shine{
  background:radial-gradient(circle at 38% 36%,rgba(240,210,255,.85) 0%,rgba(220,170,255,.35) 28%,transparent 65%);
}
.orb-purple .orb-rim{background:radial-gradient(circle,rgba(180,100,255,.45) 0%,transparent 70%)}

/* PEACH — top-left/mid, medium */
.orb-peach{
  width:clamp(320px,44vw,620px);
  height:clamp(320px,44vw,620px);
  top:4%;left:3%;
  background:
    radial-gradient(circle at 40% 36%,
      rgba(255,218,162,.68) 0%,
      rgba(244,132,95,.46) 26%,
      rgba(210,96,60,.22) 54%,
      transparent 100%);
  filter:blur(20px);
  animation:floatC 8s ease-in-out infinite;
}
.orb-peach .orb-shine{
  background:radial-gradient(circle at 38% 36%,rgba(255,245,220,.90) 0%,rgba(255,220,170,.38) 28%,transparent 65%);
}
.orb-peach .orb-rim{background:radial-gradient(circle,rgba(244,150,90,.48) 0%,transparent 70%)}

@keyframes floatA{
  0%,100%{transform:translate(0,0) scale(1)}
  32%    {transform:translate(-26px,28px) scale(1.04)}
  66%    {transform:translate(20px,-20px) scale(.97)}
}
@keyframes floatB{
  0%,100%{transform:translate(0,0) scale(1)}
  42%    {transform:translate(28px,-24px) scale(1.05)}
  74%    {transform:translate(-18px,18px) scale(.96)}
}
@keyframes floatC{
  0%,100%{transform:translate(0,0) scale(1)}
  30%    {transform:translate(-20px,-24px) scale(1.03)}
  62%    {transform:translate(22px,16px) scale(.97)}
}

/* ── HERO CONTENT ───────────────────────────────────────────────────────────── */
.hero-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  gap:clamp(.55rem,1.2vh,.85rem);max-width:860px;
  /* Frosted glass backdrop so text is always readable over orbs */
  padding:clamp(1.6rem,3vh,2.4rem) clamp(2rem,5vw,3.5rem);
  background:rgba(10,10,15,.22);
  backdrop-filter:blur(2px);
  border-radius:20px;
}

.hero-eyebrow{
  display:flex;align-items:center;gap:.65rem;
  font-size:.57rem;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(168,201,155,.62);
}
.eyebrow-line{width:20px;height:1px;background:rgba(168,201,155,.4);flex-shrink:0}

.hero-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(54px,11.5vw,122px);
  font-weight:900;letter-spacing:.07em;line-height:1;
  color:var(--text);
  text-shadow:0 0 100px rgba(168,201,155,.18),0 0 200px rgba(168,201,155,.07),0 2px 0 rgba(0,0,0,.5);
}

.hero-subtitle{
  font-family:'Cormorant',serif;
  font-size:clamp(1.3rem,3vw,2rem);
  font-weight:300;font-style:italic;
  color:rgba(240,237,229,.52);letter-spacing:.04em;
}

.hero-stats{
  font-size:.56rem;letter-spacing:.2em;
  color:rgba(240,237,229,.25);text-transform:uppercase;margin-top:.05rem;
}
.hero-stats b{color:rgba(240,237,229,.52);font-weight:400}
.hs{color:rgba(240,237,229,.14);margin:0 .28rem}

.hero-counter{
  font-size:.7rem;letter-spacing:.1em;
  color:rgba(168,201,155,.45);min-height:1.1em;
}
.cursor{
  display:inline-block;width:2px;height:.82em;
  background:var(--sage);margin-left:1px;vertical-align:middle;
  animation:blink .68s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── CTAs ───────────────────────────────────────────────────────────────────── */
.cta-row{
  display:flex;align-items:center;justify-content:center;
  gap:.75rem;flex-wrap:wrap;margin-top:.3rem;
}
.cta-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.78rem 1.9rem;border-radius:3px;
  font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.2em;
  text-decoration:none;transition:all .3s;position:relative;overflow:hidden;
}
.cta-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 60%);
  opacity:0;transition:opacity .3s;
}
.cta-btn:hover::before{opacity:1}
.cta-arrow{transition:transform .25s}
.cta-btn:hover .cta-arrow{transform:translateX(4px)}

.cta-primary{
  border:1px solid var(--sunset);background:rgba(244,132,95,.08);color:var(--sunset);
}
.cta-primary:hover{background:rgba(244,132,95,.16);box-shadow:0 0 40px rgba(244,132,95,.25)}

.cta-secondary{
  border:1px solid rgba(155,79,220,.45);background:rgba(155,79,220,.07);color:rgba(180,120,240,.8);
  font-size:.56rem;padding:.68rem 1.5rem;
}
.cta-secondary:hover{background:rgba(155,79,220,.14);box-shadow:0 0 32px rgba(155,79,220,.2)}

/* ── STATS BAR ─────────────────────────────────────────────────────────────── */
.stats-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  height:46px;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(1rem,4vw,3rem);
  background:rgba(10,10,15,.90);backdrop-filter:blur(20px);
  border-top:1px solid rgba(168,201,155,.08);padding:0 1.5rem;
}
.sbar-item{
  display:flex;align-items:center;gap:.48rem;
  white-space:nowrap;
}
.sbar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.7}
.sbar-dot.sage{background:var(--sage)}
.sbar-dot.purple{background:var(--purple)}
.sbar-dot.sunset{background:var(--sunset)}
.sbar-num{
  font-family:'Orbitron',sans-serif;
  font-size:.72rem;font-weight:700;letter-spacing:.06em;
  color:rgba(240,237,229,.75);
}
.sbar-lbl{
  font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(240,237,229,.28);
}
.sbar-sep{color:rgba(240,237,229,.1);font-size:.5rem;flex-shrink:0}

/* ── MOBILE ─────────────────────────────────────────────────────────────────── */
@media(max-width:640px){
  #hero{height:auto;min-height:100svh;padding-bottom:56px}
  .orb-peach{opacity:.7}
  .stats-bar{gap:.75rem}
  .sbar-sep{display:none}
  .sbar-item:last-child{display:none}
  .hero-content{padding:1.4rem 1.4rem;backdrop-filter:blur(4px)}
  .hero-title{font-size:clamp(44px,13vw,70px)}
}
@media(max-width:380px){
  nav{padding:0 1rem}
  .nav-link.sage{display:none}
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-brand">HIPJOY</a>
  <div class="nav-right">
    <a href="entities.html" class="nav-link purple" style="color:rgba(155,79,220,.5)">ENTITIES</a>
    <a href="garden.html" class="nav-link sage">THE GARDEN →</a>
    <a href="portfolio.html" class="nav-link dim">← PORTFOLIO</a>
  </div>
</nav>

<section id="hero">

  <!-- GLASS SPHERES — large, overlapping, bleed behind content -->
  <div class="orb orb-sage">
    <div class="orb-shine"></div>
    <div class="orb-rim"></div>
  </div>
  <div class="orb orb-purple">
    <div class="orb-shine"></div>
    <div class="orb-rim"></div>
  </div>
  <div class="orb orb-peach">
    <div class="orb-shine"></div>
    <div class="orb-rim"></div>
  </div>

  <div class="hero-content">
    <div class="hero-eyebrow">
      <div class="eyebrow-line"></div>
      LUX SEEDS — BETA
      <div class="eyebrow-line"></div>
    </div>

    <h1 class="hero-title">HIPJOY</h1>

    <div class="hero-subtitle">Your mind, architected.</div>

    <div class="hero-stats">
      <b>14 ENTITIES</b><span class="hs">·</span>
      <b>1 ROUTING ENGINE</b><span class="hs">·</span>
      <b>PERSISTENT IDENTITY</b>
    </div>

    <div class="hero-counter" id="counter-line"><span class="cursor"></span></div>

    <div class="cta-row">
      <a href="waitlist.html" class="cta-btn cta-primary">
        JOIN BETA <span class="cta-arrow">→</span>
      </a>
      <a href="entities.html" class="cta-btn cta-secondary">
        ENTITY PRODUCTS <span class="cta-arrow">→</span>
      </a>
    </div>
  </div>

</section>

<div class="stats-bar">
  <div class="sbar-item">
    <div class="sbar-dot sage"></div>
    <span class="sbar-num" id="stat-seeds">11</span>
    <span class="sbar-lbl">SEEDS PLANTED</span>
  </div>
  <div class="sbar-sep">·</div>
  <div class="sbar-item">
    <div class="sbar-dot purple"></div>
    <span class="sbar-num">14</span>
    <span class="sbar-lbl">ENTITIES ACTIVE</span>
  </div>
  <div class="sbar-sep">·</div>
  <div class="sbar-item">
    <div class="sbar-dot sunset"></div>
    <span class="sbar-num" id="stat-lux">99.1</span>
    <span class="sbar-lbl">LUX — FIELD COHERENCE</span>
  </div>
</div>

<script>
// Typewriter — first line matches target screenshot
const LINES = [
  '14 entities, 11 seeds active',
  'routing engine: ACTIVE',
  'field coherence: 99.1 LUX',
  'LUX SEEDS — now entering beta',
  'next entity contact: SONARIS',
];
let li=0,ci=0,del=false,pause=0;
const cEl=document.getElementById('counter-line');
function tick(){
  const line=LINES[li];
  if(!del){
    ci++;
    cEl.innerHTML=line.slice(0,ci)+'<span class="cursor"></span>';
    if(ci===line.length){del=true;pause=2200;}
    setTimeout(tick,54);
  } else {
    if(pause>0){pause-=80;setTimeout(tick,80);return;}
    ci--;
    cEl.innerHTML=line.slice(0,ci)+'<span class="cursor"></span>';
    if(ci===0){del=false;li=(li+1)%LINES.length;}
    setTimeout(tick,28);
  }
}
setTimeout(tick,1000);

// Live seed count
(async()=>{
  try{
    const SB='https://mdbzenhhljwmkdcmtawd.supabase.co';
    const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kYnplbmhobGp3bWtkY210YXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzY2NDUsImV4cCI6MjA5MTI1MjY0NX0.oCKA-Dpk-oxlS18mi-7R3pqA0mif1gM3J5RbDxavgaI';
    const r=await fetch(`${SB}/rest/v1/waitlist?select=id&gateway_approved=eq.true&survey_completed=eq.true`,
      {headers:{apikey:KEY,'Prefer':'count=exact',Range:'0-0'}});
    const ct=r.headers.get('content-range');
    if(ct){const n=parseInt(ct.split('/')[1]);if(!isNaN(n))document.getElementById('stat-seeds').textContent=n;}
  }catch(e){}
})();
</script>
</body>
</html>
