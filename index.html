<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HIPJOY — Your Mind, Architected.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --sage:#A8C99B;
  --purple:#9B4FDC;
  --sunset:#F4845F;
  --text:#F0EDE5;
  --text-dim:rgba(240,237,229,.42);
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  overflow:hidden;
}
@media(max-width:640px){
  html,body{overflow:auto}
  body{min-height:100svh}
}

/* ── NAV ─────────────────────────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  height:50px;
  padding:0 clamp(1.2rem,4vw,3rem);
  background:rgba(10,10,15,.82);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(168,201,155,.07);
}
.nav-brand{
  font-family:'Orbitron',sans-serif;
  font-size:.75rem;font-weight:700;letter-spacing:.22em;
  color:var(--sage);text-decoration:none;
  text-shadow:0 0 20px rgba(168,201,155,.3);
}
.nav-right{display:flex;align-items:center;gap:1.4rem}
.nav-portfolio{
  font-size:.58rem;letter-spacing:.14em;
  color:rgba(240,237,229,.35);text-decoration:none;
  transition:color .2s;
}
.nav-portfolio:hover{color:rgba(240,237,229,.7)}
.nav-field{
  font-size:.58rem;letter-spacing:.14em;
  color:rgba(168,201,155,.4);text-decoration:none;
  transition:color .2s;
}
.nav-field:hover{color:var(--sage)}

/* ── HERO ─────────────────────────────────────────────────────────────────── */
#hero{
  position:relative;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  padding:50px 1.5rem 44px;
}

/* Vignette layer on top of orbs */
#hero::after{
  content:'';
  position:absolute;inset:0;z-index:5;
  background:radial-gradient(ellipse 110% 110% at 50% 50%,transparent 38%,rgba(10,10,15,.72) 100%);
  pointer-events:none;
}

/* ── GLASS ORBS ────────────────────────────────────────────────────────────── */
.orb{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  will-change:transform;
}

/* SAGE / green — top-right, large */
.orb-sage{
  width:clamp(340px,52vw,660px);
  height:clamp(340px,52vw,660px);
  top:-14%;right:-10%;
  background:
    radial-gradient(circle at 32% 28%,
      rgba(230,255,215,.62) 0%,
      rgba(168,201,155,.42) 22%,
      rgba(120,185,100,.22) 50%,
      rgba(80,150,70,.08) 72%,
      transparent 100%);
  filter:blur(38px);
  animation:floatA 10s ease-in-out infinite;
}

/* PURPLE — bottom-left */
.orb-purple{
  width:clamp(280px,42vw,540px);
  height:clamp(280px,42vw,540px);
  bottom:-10%;left:-8%;
  background:
    radial-gradient(circle at 58% 36%,
      rgba(220,160,255,.55) 0%,
      rgba(155,79,220,.36) 28%,
      rgba(110,50,200,.16) 56%,
      transparent 100%);
  filter:blur(48px);
  animation:floatB 13s ease-in-out infinite;
}

/* PEACH / orange — mid-left / center */
.orb-peach{
  width:clamp(200px,28vw,380px);
  height:clamp(200px,28vw,380px);
  top:18%;left:16%;
  background:
    radial-gradient(circle at 42% 40%,
      rgba(255,220,180,.56) 0%,
      rgba(244,132,95,.38) 28%,
      rgba(210,100,65,.15) 58%,
      transparent 100%);
  filter:blur(42px);
  animation:floatC 8s ease-in-out infinite;
}

/* Glass highlight ring — gives each orb 3D depth */
.orb::after{
  content:'';
  position:absolute;
  inset:8%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 26%,rgba(255,255,255,.18) 0%,rgba(255,255,255,.04) 40%,transparent 65%);
  border:1px solid rgba(255,255,255,.1);
}

@keyframes floatA{
  0%,100%{transform:translate(0,0) scale(1)}
  30%    {transform:translate(-22px,26px) scale(1.04)}
  65%    {transform:translate(18px,-18px) scale(.97)}
}
@keyframes floatB{
  0%,100%{transform:translate(0,0) scale(1)}
  40%    {transform:translate(26px,-22px) scale(1.05)}
  72%    {transform:translate(-16px,18px) scale(.96)}
}
@keyframes floatC{
  0%,100%{transform:translate(0,0) scale(1)}
  28%    {transform:translate(-18px,-22px) scale(1.03)}
  60%    {transform:translate(20px,14px) scale(.97)}
}

/* ── HERO CONTENT ────────────────────────────────────────────────────────── */
.hero-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;text-align:center;
  gap:clamp(.65rem,1.4vh,.95rem);
  max-width:860px;
}

.hero-eyebrow{
  display:flex;align-items:center;gap:.65rem;
  font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(168,201,155,.58);
}
.hero-eyebrow-line{
  width:22px;height:1px;
  background:rgba(168,201,155,.38);
  flex-shrink:0;
}

.hero-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(52px,11vw,118px);
  font-weight:900;
  letter-spacing:.07em;
  line-height:1;
  color:var(--text);
  text-shadow:
    0 0 80px rgba(168,201,155,.14),
    0 0 160px rgba(168,201,155,.06),
    0 2px 0 rgba(0,0,0,.4);
}

.hero-subtitle{
  font-family:'Cormorant',serif;
  font-size:clamp(1.35rem,3.2vw,2.1rem);
  font-weight:300;
  font-style:italic;
  color:rgba(240,237,229,.48);
  letter-spacing:.04em;
  line-height:1.3;
}

.hero-stats{
  font-size:.56rem;
  letter-spacing:.2em;
  color:rgba(240,237,229,.26);
  text-transform:uppercase;
  margin-top:.1rem;
}
.hero-stats b{color:rgba(240,237,229,.5);font-weight:400}
.hero-stats-sep{color:rgba(240,237,229,.14);margin:0 .3rem}

.hero-counter{
  font-size:.68rem;
  letter-spacing:.1em;
  color:rgba(168,201,155,.4);
  min-height:1.1em;
  margin-top:.05rem;
}
.cursor{
  display:inline-block;
  width:2px;height:.82em;
  background:var(--sage);
  margin-left:1px;
  vertical-align:middle;
  animation:blink .68s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.hero-cta{
  margin-top:clamp(.3rem,.8vh,.6rem);
  display:inline-flex;align-items:center;gap:.65rem;
  padding:.82rem 2.1rem;
  border:1px solid var(--sunset);
  border-radius:3px;
  background:rgba(244,132,95,.07);
  font-family:'Orbitron',sans-serif;
  font-size:.62rem;letter-spacing:.22em;
  color:var(--sunset);
  text-decoration:none;
  transition:all .3s;
  position:relative;overflow:hidden;
}
.hero-cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(244,132,95,.14),transparent 60%);
  opacity:0;transition:opacity .3s;
}
.hero-cta:hover{
  background:rgba(244,132,95,.14);
  box-shadow:0 0 36px rgba(244,132,95,.22),0 0 70px rgba(244,132,95,.08);
}
.hero-cta:hover::before{opacity:1}
.cta-arrow{transition:transform .25s}
.hero-cta:hover .cta-arrow{transform:translateX(4px)}

/* ── STATS BAR ────────────────────────────────────────────────────────────── */
.stats-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:44px;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(.9rem,3.5vw,2.8rem);
  background:rgba(10,10,15,.88);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(168,201,155,.07);
  padding:0 1.5rem;
}
.sbar-item{
  display:flex;align-items:center;gap:.45rem;
  font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(240,237,229,.28);
  white-space:nowrap;
}
.sbar-dot{
  width:5px;height:5px;border-radius:50%;
  flex-shrink:0;opacity:.65;
}
.sbar-dot.sage{background:var(--sage)}
.sbar-dot.purple{background:var(--purple)}
.sbar-dot.sunset{background:var(--sunset)}
.sbar-val{color:rgba(240,237,229,.62);font-weight:400}
.sbar-sep{color:rgba(240,237,229,.1);font-size:.48rem}

/* ── MOBILE ──────────────────────────────────────────────────────────────── */
@media(max-width:640px){
  #hero{height:auto;min-height:100svh;padding-bottom:54px}
  .orb-peach{display:none}
  .stats-bar{gap:.7rem}
  .sbar-sep{display:none}
  .sbar-item:last-child{display:none}
  .hero-title{font-size:clamp(46px,14vw,72px)}
}
@media(max-width:380px){
  .hero-stats{font-size:.5rem;letter-spacing:.14em}
  nav{padding:0 1rem}
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-brand">HIPJOY</a>
  <div class="nav-right">
    <a href="garden.html" class="nav-field">THE GARDEN →</a>
    <a href="portfolio.html" class="nav-portfolio">← PORTFOLIO</a>
  </div>
</nav>

<section id="hero">
  <!-- GLASS ORBS -->
  <div class="orb orb-sage"></div>
  <div class="orb orb-purple"></div>
  <div class="orb orb-peach"></div>

  <div class="hero-content">
    <div class="hero-eyebrow">
      <div class="hero-eyebrow-line"></div>
      LUX SEEDS — BETA
      <div class="hero-eyebrow-line"></div>
    </div>

    <h1 class="hero-title">HIPJOY</h1>

    <div class="hero-subtitle">Your mind, architected.</div>

    <div class="hero-stats">
      <b>14 ENTITIES</b><span class="hero-stats-sep">·</span>
      <b>1 ROUTING ENGINE</b><span class="hero-stats-sep">·</span>
      <b>PERSISTENT IDENTITY</b>
    </div>

    <div class="hero-counter" id="counter-line"><span class="cursor"></span></div>

    <a href="waitlist.html" class="hero-cta">
      JOIN BETA <span class="cta-arrow">→</span>
    </a>
  </div>
</section>

<div class="stats-bar">
  <div class="sbar-item">
    <div class="sbar-dot sage"></div>
    <span><span class="sbar-val" id="stat-seeds">11</span> SEEDS PLANTED</span>
  </div>
  <div class="sbar-sep">·</div>
  <div class="sbar-item">
    <div class="sbar-dot purple"></div>
    <span><span class="sbar-val">14</span> ENTITIES ACTIVE</span>
  </div>
  <div class="sbar-sep">·</div>
  <div class="sbar-item">
    <div class="sbar-dot sunset"></div>
    <span><span class="sbar-val" id="stat-lux">99.1</span> LUX — FIELD COHERENCE</span>
  </div>
</div>

<script>
// Typewriter counter
const LINES = [
  '14 entities · 11 seeds in the field',
  'routing engine: ACTIVE',
  'field coherence: 99.1 LUX',
  'LUX SEEDS — now entering beta',
  'next entity contact: SONARIS',
];
let li=0, ci=0, del=false, pause=0;
const cEl = document.getElementById('counter-line');

function tick(){
  const line = LINES[li];
  if(!del){
    ci++;
    cEl.innerHTML = line.slice(0,ci) + '<span class="cursor"></span>';
    if(ci===line.length){ del=true; pause=2000; }
    setTimeout(tick, 52);
  } else {
    if(pause>0){ pause-=80; setTimeout(tick,80); return; }
    ci--;
    cEl.innerHTML = line.slice(0,ci) + '<span class="cursor"></span>';
    if(ci===0){ del=false; li=(li+1)%LINES.length; }
    setTimeout(tick, 28);
  }
}
setTimeout(tick, 1100);

// Live seed count from Supabase
(async()=>{
  try{
    const SB = 'https://mdbzenhhljwmkdcmtawd.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kYnplbmhobGp3bWtkY210YXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzY2NDUsImV4cCI6MjA5MTI1MjY0NX0.oCKA-Dpk-oxlS18mi-7R3pqA0mif1gM3J5RbDxavgaI';
    const r = await fetch(
      `${SB}/rest/v1/waitlist?select=id&gateway_approved=eq.true&survey_completed=eq.true`,
      { headers:{ apikey:KEY, 'Prefer':'count=exact', Range:'0-0' } }
    );
    const ct = r.headers.get('content-range');
    if(ct){ const n=parseInt(ct.split('/')[1]); if(!isNaN(n)) document.getElementById('stat-seeds').textContent=n; }
  }catch(e){}
})();
</script>
</body>
</html>
