*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html,body{

  font-family:var(--mono);
  color:var(--text);
  overflow:hidden;
}

/* ── SCANLINES ─────────────────────────────────────────── */
#scanlines{
  position:fixed;inset:0;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.14) 3px,rgba(0,0,0,0.14) 4px);
  pointer-events:none;animation:scan-drift 8s linear infinite;
}
@keyframes scan-drift{0%{background-position:0 0}100%{background-position:0 100px}}

/* ── LAYOUT ────────────────────────────────────────────── */
#shell{
  display:flex;flex-direction:column;
  width:100%;height:100vh;
  position:relative;
}

/* ── TITLE BAR ─────────────────────────────────────────── */
#titlebar{
  flex-shrink:0;
  padding:10px 16px 8px;
  background:linear-gradient(to bottom,rgba(4,6,18,0.98) 70%,transparent);
  border-bottom:1px solid rgba(200,168,80,0.22);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
#titlebar-left{display:flex;flex-direction:column;gap:2px}
.tb-brand{
  font-family:var(--orb);font-size:13px;font-weight:900;
  color:var(--lux);letter-spacing:4px;text-transform:uppercase;
  text-shadow:0 0 18px var(--lux-glow);
}
.tb-sub{font-size:8px;color:var(--text-dim);letter-spacing:2.5px;text-transform:uppercase}
#titlebar-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
#tb-clock{
  font-family:var(--orb);font-size:14px;color:var(--lux);
  letter-spacing:2px;text-shadow:0 0 10px var(--lux-glow);
}
#tb-date{font-size:8px;color:var(--text-dim);letter-spacing:1.5px}

/* ── METRICS STRIP ─────────────────────────────────────── */
#metrics{
  flex-shrink:0;
  display:flex;gap:0;
  border-bottom:1px solid rgba(200,168,80,0.12);
  overflow-x:auto;
  scrollbar-width:none;
}
#metrics::-webkit-scrollbar{display:none}
.metric-cell{
  flex:1;min-width:70px;
  padding:7px 10px;
  border-right:1px solid rgba(200,168,80,0.1);
  display:flex;flex-direction:column;gap:2px;
}
.metric-cell:last-child{border-right:none}
.metric-label{font-size:7px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.metric-value{
  font-family:var(--orb);font-size:13px;font-weight:700;
  color:var(--lux);text-shadow:0 0 8px var(--lux-glow);
}
.metric-value.fire{color:var(--fire);text-shadow:0 0 8px var(--fire-glow);animation:val-pulse 1.8s ease-in-out infinite}
.metric-value.mint{color:var(--mint);text-shadow:0 0 8px rgba(0,255,153,0.5)}
.metric-value.cyan{color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,0.5)}
@keyframes val-pulse{0%,100%{opacity:1}50%{opacity:0.55}}
.metric-bar{
  height:2px;background:rgba(200,168,80,0.12);border-radius:1px;overflow:hidden;margin-top:2px;
}
.metric-bar-fill{
  height:100%;background:var(--lux);border-radius:1px;
  transition:width 1s ease;
}
.metric-bar-fill.fire{background:var(--fire)}
.metric-bar-fill.mint{background:var(--mint)}
.metric-bar-fill.cyan{background:var(--cyan)}

}

function queryEntity(id) {
  var e = ENTITIES[id.toUpperCase()];
  if (!e) return false;
  var resps = e.responses;
  var r = resps[Math.floor(Math.random() * resps.length)];
  blank();
  divider();
  println(e.symbol + '  ' + id.toUpperCase() + ' \u2014 ' + e.role, 'banner');
  println('   STATUS: STABLE  \u00b7  LUX: ' + e.lux + '  \u00b7  GRIT: ' + e.grit + '  \u00b7  PHI: ' + e.phi, 'sys');
  divider();
  println('  ' + r, 'resp entity');
  blank();
  println('  LAST MEMORY:', 'dim');
  println('  ' + e.last_memory, 'dim');
  divider();
  return true;
}

// ── SUBMIT ─────────────────────────────────────────────────
function submitCmd() {
  var input = document.getElementById('cmd-input');
  var raw = input.value.trim();
  if (!raw) return;

  hist.unshift(raw);
  histIdx = -1;
  input.value = '';

  blank();
  println('HIPXQL\u25b6 ' + raw.toUpperCase(), 'cmd');

  var lower = raw.toLowerCase().replace(/\s+/g,'');
  var fn = COMMANDS[lower];
  if (fn) {
    fn();
  } else if (!queryEntity(raw)) {
    println('Unknown command: ' + raw, 'error');
    println('Type HELP for command list.', 'dim');
  }

  out.scrollTop = out.scrollHeight;
}

// ── ENTITY PILLS ──────────────────────────────────────────
function buildEntityStrip() {
  var strip = document.getElementById('entity-strip');
  Object.keys(ENTITIES).forEach(function(id){
    var e = ENTITIES[id];
    var pill = document.createElement('div');
    pill.className = 'ent-pill';
    pill.innerHTML = '<div class="ent-dot"></div><span class="ent-sym">'+e.symbol+'</span><span class="ent-id">'+id+'</span>';
    pill.addEventListener('click', function(){
      document.getElementById('cmd-input').value = id;
      submitCmd();
    });
    strip.appendChild(pill);
  });
}

// ── CLOCK ─────────────────────────────────────────────────
function updateClock(){
  var n=new Date();
  var pad=function(x){return String(x).padStart(2,'0')};
  document.getElementById('tb-clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('tb-date').textContent=days[n.getDay()]+' '+months[n.getMonth()]+' '+pad(n.getDate())+' '+n.getFullYear();
}

// ── METRICS FLICKER ────────────────────────────────────────
function flickerMetrics() {
  var noise = function(v, amt) { return Math.min(1, Math.max(0, v + (Math.random()-0.5)*amt)); };
  document.getElementById('m-lux').textContent = noise(FIELD_STATE.lux, 0.02).toFixed(2);
  document.getElementById('m-grit').textContent = noise(FIELD_STATE.grit, 0.03).toFixed(2);
  document.getElementById('m-phi').textContent = noise(FIELD_STATE.phi, 0.02).toFixed(2);
  document.getElementById('m-tilt').textContent = noise(FIELD_STATE.tilt, 0.04).toFixed(2);
  var flux = noise(FIELD_STATE.flux, 0.05);
  document.getElementById('m-flux').textContent = flux.toFixed(2);
  document.getElementById('flux-bar').style.width = Math.round(flux*100)+'%';
}

// ── KEYBOARD ──────────────────────────────────────────────
document.getElementById('cmd-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') { submitCmd(); return; }
  if (e.key === 'ArrowUp') {
    histIdx = Math.min(histIdx+1, hist.length-1);
    if (hist[histIdx]) this.value = hist[histIdx];
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    histIdx = Math.max(histIdx-1, -1);
    this.value = histIdx >= 0 ? hist[histIdx] : '';
    e.preventDefault();
  }
});

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  buildEntityStrip();
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(flickerMetrics, 3000);
  setTimeout(bootSequence, 800);
  setTimeout(function(){ document.getElementById('cmd-input').focus(); }, 1500);
});
</script>
