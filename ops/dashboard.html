<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HIPJOY OPS · Lead Dashboard</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%233d5a3a' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%23c87531'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f0de;--paper-2:#f1e9d1;--cream-deep:#e8ddc0;
    --ink:#2a2419;--ink-soft:#4a4236;--muted:#7c735f;
    --moss:#3d5a3a;--moss-light:#5c7a4f;--fern:#6b8a52;
    --terra:#c87531;--terra-deep:#a85a24;--amber:#d89560;
    --line:rgba(42,36,25,.12);--line-2:rgba(42,36,25,.22);
    --display:"Fraunces",Georgia,serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --status-prospect:#8a8069;
    --status-contacted:#c87531;
    --status-replied:#6b8a52;
    --status-booked:#3d5a3a;
    --status-dead:#a85a24;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:var(--moss);text-decoration:none}
  a:hover{color:var(--terra)}
  button{font:inherit;cursor:pointer;border:0;background:0;color:inherit}
  input,select{font:inherit}
  ::selection{background:var(--terra);color:var(--paper)}

  /* NAV */
  nav.top{
    background:var(--paper-2);border-bottom:1px solid var(--line);
    padding:14px 24px;display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
    position:sticky;top:0;z-index:30;backdrop-filter:blur(8px);
  }
  nav.top .brand{display:flex;align-items:center;gap:10px;color:var(--ink);font-weight:600}
  nav.top .brand svg{width:18px;height:18px;color:var(--moss)}
  nav.top .brand em{font-style:normal;color:var(--terra)}
  nav.top .links{display:flex;gap:18px}
  nav.top .links a{color:var(--ink-soft)}
  nav.top .links a:hover{color:var(--moss)}
  nav.top .links a.active{color:var(--moss)}

  /* STATS STRIP */
  .stats{
    display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
    border-bottom:1px solid var(--line);
  }
  @media(max-width:900px){.stats{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--paper);padding:16px 20px;text-align:center}
  .stat .v{font-family:var(--display);font-size:1.8rem;font-weight:500;color:var(--ink);line-height:1;display:block}
  .stat .l{font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px;display:block}
  .stat.hot .v{color:var(--terra)}
  .stat.booked .v{color:var(--moss)}

  /* MAIN LAYOUT */
  main{max-width:1600px;margin:0 auto;padding:22px 24px 60px}
  h1{font-family:var(--display);font-weight:500;font-size:2rem;letter-spacing:-.01em;margin-bottom:6px;color:var(--ink)}
  h1 em{font-style:italic;color:var(--moss);font-weight:400}
  .tagline{color:var(--muted);font-size:.92rem;margin-bottom:22px}

  /* FILTER BAR */
  .toolbar{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    padding:16px;background:var(--paper-2);
    border:1px solid var(--line);border-radius:6px;margin-bottom:18px;
  }
  .toolbar input[type=text], .toolbar select{
    padding:8px 12px;border:1px solid var(--line);border-radius:4px;
    background:#fffaed;font-size:.88rem;color:var(--ink);min-width:140px;
  }
  .toolbar input[type=text]:focus, .toolbar select:focus{outline:0;border-color:var(--moss);background:#fff}
  .toolbar label{
    font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-right:4px;display:flex;align-items:center;gap:6px;font-weight:500;
  }
  .toolbar .spacer{flex:1}
  .toolbar .btn{
    padding:8px 14px;border-radius:4px;background:var(--moss);color:var(--paper);
    font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
    transition:background .2s;
  }
  .toolbar .btn:hover{background:var(--terra)}
  .toolbar .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2)}
  .toolbar .btn.ghost:hover{border-color:var(--moss);color:var(--moss)}

  /* TABLE */
  .table-wrap{
    background:var(--paper-2);border:1px solid var(--line);border-radius:6px;overflow:hidden;
    overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  thead th{
    background:var(--cream-deep);color:var(--ink-soft);
    font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
    padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);font-weight:500;
    cursor:pointer;user-select:none;white-space:nowrap;
  }
  thead th:hover{color:var(--moss)}
  thead th.sorted{color:var(--moss)}
  thead th.sorted::after{content:" ↓";font-size:.8rem}
  thead th.sorted.asc::after{content:" ↑"}
  tbody tr{border-bottom:1px solid var(--line);transition:background .15s}
  tbody tr:hover{background:#fffaed;cursor:pointer}
  tbody td{padding:10px 14px;vertical-align:middle;white-space:nowrap}
  tbody td.name{font-weight:500;color:var(--ink);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tbody td.center{text-align:center}
  .ind-pill{
    display:inline-block;padding:2px 8px;border-radius:10px;
    font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;
    background:var(--cream-deep);color:var(--ink-soft);font-weight:500;
  }
  .heat-bar{
    display:inline-block;width:60px;height:6px;border-radius:3px;background:var(--line);
    position:relative;vertical-align:middle;
  }
  .heat-bar::after{
    content:"";position:absolute;top:0;left:0;bottom:0;
    width:var(--p,0%);background:linear-gradient(90deg,var(--moss),var(--terra));
    border-radius:3px;transition:width .3s;
  }
  .heat-val{margin-left:8px;font-family:var(--mono);font-weight:500;color:var(--ink);font-size:.78rem}
  .status-pill{
    display:inline-block;padding:3px 10px;border-radius:12px;
    font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  }
  .status-prospect{background:rgba(138,128,105,.15);color:var(--status-prospect)}
  .status-contacted{background:rgba(200,117,49,.15);color:var(--status-contacted)}
  .status-replied{background:rgba(107,138,82,.18);color:var(--status-replied)}
  .status-booked{background:rgba(61,90,58,.2);color:var(--status-booked);font-weight:600}
  .status-dead{background:rgba(168,90,36,.12);color:var(--status-dead);opacity:.7}
  .icon-ok{color:var(--moss);font-weight:700}
  .icon-no{color:var(--muted);opacity:.4}
  .row-actions{display:flex;gap:4px}
  .row-actions .mini{
    padding:4px 10px;border-radius:3px;background:var(--paper);border:1px solid var(--line);
    font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);
    transition:all .15s;
  }
  .row-actions .mini:hover{background:var(--moss);color:var(--paper);border-color:var(--moss)}

  .empty{
    padding:60px 30px;text-align:center;color:var(--muted);
    font-family:var(--display);font-size:1.2rem;font-style:italic;
  }

  /* FOOTER */
  .foot{
    margin-top:20px;padding:14px 0;font-family:var(--mono);font-size:.7rem;
    color:var(--muted);letter-spacing:.1em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .pagination{display:flex;gap:6px;align-items:center}
  .pagination button{
    padding:4px 10px;background:var(--paper-2);border:1px solid var(--line);border-radius:3px;
    font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);font-weight:500;
  }
  .pagination button:hover{border-color:var(--moss);color:var(--moss)}
  .pagination button:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

<nav class="top">
  <a href="#" class="brand">
    <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="26" stroke="currentColor" stroke-width="2"/><circle cx="32" cy="32" r="6" fill="#c87531"/></svg>
    <span>HIPJOY <em>OPS</em></span>
  </a>
  <div class="links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="plan.md">Plan</a>
    <a href="../studio.html" target="_blank">Studio ↗</a>
    <a href="../index.html" target="_blank">Hub ↗</a>
  </div>
</nav>

<div class="stats" id="stats">
  <div class="stat"><span class="v" id="s-total">—</span><span class="l">Total leads</span></div>
  <div class="stat hot"><span class="v" id="s-hot">—</span><span class="l">Hot (heat ≥ 60)</span></div>
  <div class="stat"><span class="v" id="s-prospect">—</span><span class="l">Prospect</span></div>
  <div class="stat"><span class="v" id="s-contacted">—</span><span class="l">Contacted</span></div>
  <div class="stat"><span class="v" id="s-replied">—</span><span class="l">Replied</span></div>
  <div class="stat booked"><span class="v" id="s-booked">—</span><span class="l">Booked · $</span></div>
</div>

<main>
  <h1>Lead <em>dashboard</em></h1>
  <div class="tagline">Every no-website business we've found, ranked by heat. Click a row to open the workspace and build their mock.</div>

  <div class="toolbar">
    <label>Search</label>
    <input type="text" id="search" placeholder="name, city, phone…" />

    <label>Industry</label>
    <select id="f-industry"><option value="">All</option></select>

    <label>State</label>
    <select id="f-state"><option value="">All</option></select>

    <label>Status</label>
    <select id="f-status">
      <option value="">All</option>
      <option value="prospect">Prospect</option>
      <option value="contacted">Contacted</option>
      <option value="replied">Replied</option>
      <option value="booked">Booked</option>
      <option value="dead">Dead</option>
    </select>

    <label>Min heat</label>
    <select id="f-heat">
      <option value="0">Any</option>
      <option value="40">40+</option>
      <option value="60">60+ (hot)</option>
      <option value="80">80+ (fire)</option>
    </select>

    <label>Has</label>
    <select id="f-has">
      <option value="">Anything</option>
      <option value="phone">Phone</option>
      <option value="email">Email</option>
      <option value="both">Phone + Email</option>
    </select>

    <div class="spacer"></div>

    <button class="btn ghost" id="export-csv">Export CSV</button>
    <button class="btn" id="import-json">Import JSON</button>
    <input type="file" id="file-json" accept="application/json" style="display:none"/>
  </div>

  <div class="table-wrap">
    <table id="leads-table">
      <thead>
        <tr>
          <th data-sort="heat" class="sorted">Heat</th>
          <th data-sort="name">Name</th>
          <th data-sort="industry">Industry</th>
          <th data-sort="city">City</th>
          <th data-sort="state">St</th>
          <th class="center">☎</th>
          <th class="center">✉</th>
          <th data-sort="status">Status</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leads-body"></tbody>
    </table>
  </div>

  <div class="foot">
    <div id="count-label">—</div>
    <div class="pagination">
      <button id="prev-page">← Prev</button>
      <span id="page-label" style="padding:4px 10px">Page 1</span>
      <button id="next-page">Next →</button>
    </div>
  </div>
</main>

<script>
// ============ STATE ============
let ALL_LEADS = [];
let FILTERED = [];
let PAGE = 0;
const PAGE_SIZE = 50;
let SORT = { key: 'heat', asc: false };

// ============ LOAD ============
async function load() {
  // 1. try localStorage first (user edits persist there)
  const stored = localStorage.getItem('hipjoy_ops_leads');
  if (stored) {
    try {
      const j = JSON.parse(stored);
      ALL_LEADS = j.leads || j;
      console.log(`loaded ${ALL_LEADS.length} leads from localStorage`);
    } catch (e) { console.error('bad localStorage, loading seed', e); }
  }
  if (!ALL_LEADS.length) {
    try {
      const r = await fetch('leads.json');
      if (!r.ok) throw new Error('no leads.json');
      const j = await r.json();
      ALL_LEADS = j.leads || j;
      save();
      console.log(`seeded ${ALL_LEADS.length} leads from file`);
    } catch (e) {
      console.error('no leads found', e);
      ALL_LEADS = [];
    }
  }
  populateFilters();
  applyFilters();
}

function save() {
  localStorage.setItem('hipjoy_ops_leads', JSON.stringify({
    updated_at: new Date().toISOString(),
    count: ALL_LEADS.length,
    leads: ALL_LEADS,
  }));
}

// ============ RENDER ============
function updateStats() {
  const booked = ALL_LEADS.filter(l => l.status === 'booked');
  const bookedRev = booked.reduce((s,l)=>{
    const tier = l.pitch_tier || '$350';
    return s + parseInt(tier.replace(/[^\d]/g,'')) || 0;
  }, 0);
  document.getElementById('s-total').textContent = ALL_LEADS.length;
  document.getElementById('s-hot').textContent = ALL_LEADS.filter(l => l.heat >= 60).length;
  document.getElementById('s-prospect').textContent = ALL_LEADS.filter(l => l.status === 'prospect').length;
  document.getElementById('s-contacted').textContent = ALL_LEADS.filter(l => l.status === 'contacted').length;
  document.getElementById('s-replied').textContent = ALL_LEADS.filter(l => l.status === 'replied').length;
  document.getElementById('s-booked').textContent = `${booked.length} · $${bookedRev}`;
}

function populateFilters() {
  const industries = [...new Set(ALL_LEADS.map(l => l.industry))].sort();
  const states = [...new Set(ALL_LEADS.map(l => l.state).filter(Boolean))].sort();
  const indSel = document.getElementById('f-industry');
  const stSel = document.getElementById('f-state');
  indSel.innerHTML = '<option value="">All</option>' + industries.map(i => `<option value="${i}">${i}</option>`).join('');
  stSel.innerHTML = '<option value="">All</option>' + states.map(s => `<option value="${s}">${s}</option>`).join('');
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const fInd = document.getElementById('f-industry').value;
  const fSt = document.getElementById('f-state').value;
  const fStatus = document.getElementById('f-status').value;
  const fHeat = parseInt(document.getElementById('f-heat').value) || 0;
  const fHas = document.getElementById('f-has').value;

  FILTERED = ALL_LEADS.filter(l => {
    if (fInd && l.industry !== fInd) return false;
    if (fSt && l.state !== fSt) return false;
    if (fStatus && l.status !== fStatus) return false;
    if ((l.heat || 0) < fHeat) return false;
    if (fHas === 'phone' && !l.phone) return false;
    if (fHas === 'email' && !l.email) return false;
    if (fHas === 'both' && (!l.phone || !l.email)) return false;
    if (q) {
      const hay = `${l.name} ${l.city} ${l.state} ${l.phone} ${l.email} ${l.notes||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // sort
  FILTERED.sort((a,b) => {
    let av = a[SORT.key], bv = b[SORT.key];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === undefined || av === null) av = '';
    if (bv === undefined || bv === null) bv = '';
    if (av < bv) return SORT.asc ? -1 : 1;
    if (av > bv) return SORT.asc ? 1 : -1;
    return 0;
  });

  PAGE = 0;
  render();
  updateStats();
}

function render() {
  const body = document.getElementById('leads-body');
  const start = PAGE * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const rows = FILTERED.slice(start, end);

  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="10" class="empty">No leads match your filters. Try widening.</td></tr>`;
  } else {
    body.innerHTML = rows.map(l => {
      const heat = l.heat || 0;
      return `<tr data-id="${l.id}">
        <td>
          <div class="heat-bar" style="--p:${heat}%"></div>
          <span class="heat-val">${heat}</span>
        </td>
        <td class="name" title="${escHtml(l.name)}">${escHtml(l.name)}</td>
        <td><span class="ind-pill">${escHtml(l.industry || '')}</span></td>
        <td>${escHtml(l.city || '—')}</td>
        <td>${escHtml(l.state || '—')}</td>
        <td class="center">${l.phone ? '<span class="icon-ok">✓</span>' : '<span class="icon-no">·</span>'}</td>
        <td class="center">${l.email ? '<span class="icon-ok">✓</span>' : '<span class="icon-no">·</span>'}</td>
        <td><span class="status-pill status-${l.status||'prospect'}">${l.status||'prospect'}</span></td>
        <td style="color:var(--muted);font-size:.82rem;max-width:240px;overflow:hidden;text-overflow:ellipsis">${escHtml((l.notes || '').slice(0, 60))}${(l.notes||'').length > 60 ? '…' : ''}</td>
        <td><div class="row-actions"><button class="mini" onclick="openCompose(event, '${l.id}')">Open →</button></div></td>
      </tr>`;
    }).join('');
  }
  document.getElementById('count-label').textContent =
    `Showing ${start+1}–${Math.min(end, FILTERED.length)} of ${FILTERED.length} filtered (${ALL_LEADS.length} total)`;
  document.getElementById('page-label').textContent = `Page ${PAGE+1} / ${Math.max(1, Math.ceil(FILTERED.length / PAGE_SIZE))}`;
  document.getElementById('prev-page').disabled = PAGE === 0;
  document.getElementById('next-page').disabled = end >= FILTERED.length;
}

function escHtml(s) {
  return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ EVENTS ============
function openCompose(e, id) {
  e.stopPropagation();
  window.location.href = `compose.html?id=${id}`;
}

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (SORT.key === key) SORT.asc = !SORT.asc;
    else { SORT.key = key; SORT.asc = false; }
    document.querySelectorAll('thead th').forEach(x => x.classList.remove('sorted','asc'));
    th.classList.add('sorted');
    if (SORT.asc) th.classList.add('asc');
    applyFilters();
  });
});

document.addEventListener('click', e => {
  const tr = e.target.closest('tbody tr');
  if (tr && !e.target.closest('.row-actions')) {
    const id = tr.dataset.id;
    if (id) openCompose(e, id);
  }
});

['search','f-industry','f-state','f-status','f-heat','f-has'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
});

document.getElementById('prev-page').addEventListener('click', () => { if (PAGE > 0) { PAGE--; render(); } });
document.getElementById('next-page').addEventListener('click', () => { if ((PAGE+1) * PAGE_SIZE < FILTERED.length) { PAGE++; render(); } });

// Export CSV
document.getElementById('export-csv').addEventListener('click', () => {
  if (!FILTERED.length) return alert('No filtered leads to export.');
  const fields = ['id','heat','status','industry','name','phone','email','addr_street','city','state','postcode','pitch_tier','contact_method','last_contacted_at','notes','lat','lon','osm_id'];
  const head = fields.join(',');
  const rows = FILTERED.map(l => fields.map(f => {
    const v = (l[f] || '').toString().replace(/"/g, '""');
    return /[,"\n]/.test(v) ? `"${v}"` : v;
  }).join(','));
  const csv = [head, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hipjoy-leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// Import JSON
document.getElementById('import-json').addEventListener('click', () => {
  document.getElementById('file-json').click();
});
document.getElementById('file-json').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  const text = await f.text();
  try {
    const j = JSON.parse(text);
    const incoming = j.leads || j;
    if (!Array.isArray(incoming)) throw new Error('not an array');
    const existing = new Set(ALL_LEADS.map(l => l.osm_id || l.id));
    const added = incoming.filter(l => !existing.has(l.osm_id || l.id));
    ALL_LEADS = ALL_LEADS.concat(added);
    save();
    populateFilters();
    applyFilters();
    alert(`Imported ${added.length} new leads. ${ALL_LEADS.length} total.`);
  } catch (err) {
    alert(`Import failed: ${err.message}`);
  }
});

load();
</script>
</body>
</html>
